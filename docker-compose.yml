services:
  postgres:
    image: postgres:16-alpine
    container_name: iaesmartguide-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: iaesmartguide
      POSTGRES_PASSWORD: iaesmartguide
      POSTGRES_DB: iaesmartguide
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
